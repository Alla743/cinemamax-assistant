name: Build Windows Installer (.exe)

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install web dependencies
        run: bun install --frozen-lockfile

      - name: Build web app as static site
        run: bun run build
        env:
          NITRO_PRESET: static

      - name: Prepare static app for Electron
        shell: pwsh
        run: |
          if (Test-Path ".output/public/index.html") {
            $source = ".output/public"
          } elseif (Test-Path "dist/index.html") {
            $source = "dist"
          } else {
            Write-Host "Could not find built index.html. Existing index files:"
            Get-ChildItem -Recurse -Filter index.html | ForEach-Object { Write-Host $_.FullName }
            throw "Web build did not produce a static index.html"
          }

          $target = "electron/app/.output/public"
          New-Item -ItemType Directory -Path $target -Force | Out-Null
          Copy-Item "$source/*" $target -Recurse -Force
          Write-Host "Copied static app from $source to $target"

      - name: Install Electron dependencies
        working-directory: electron
        run: npm install --no-audit --no-fund --legacy-peer-deps

      - name: Build Windows installer (.exe)
        working-directory: electron
        run: npx --no-install electron-builder --win --x64 --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: "false"

      - name: Upload installer artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Cinemax-Store-Windows-Installer
          path: release/*.exe
          retention-days: 30
          if-no-files-found: warn

      - name: Create GitHub Release (on tag)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: release/*.exe
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
